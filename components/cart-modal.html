<div id="cartModal" class="cart-modal" aria-hidden="true" role="dialog" aria-label="Carrinho de compras">
  <div class="cart-modal__backdrop" data-action="close-cart"></div>
  <div class="cart-modal__content" role="document">
    <header class="cart-modal__header">
      <h2 class="cart-modal__title">Carrinho</h2>
      <button type="button" class="cart-modal__close" data-action="close-cart" aria-label="Fechar">✕</button>
    </header>

    <div class="cart-modal__body">
      <div class="cart-items" aria-live="polite">
        <p class="muted">Seu carrinho está vazio.</p>
      </div>
    </div>

    <footer class="cart-modal__footer">
      <div class="cart-modal__totals">
        <span>Total:</span>
        <span class="cart-total">R$ 0,00</span>
      </div>
      <div class="cart-actions" style="margin-top: 1rem; display: flex; gap: 0.5rem; width: 100%;">
        <button type="button" class="btn btn-outline" data-action="clear-cart" style="flex:1;">Limpar</button>
        <button type="button" class="btn btn-primary" data-action="send-cart" style="flex:1;">Enviar pedido</button>
      </div>
    </footer>
  </div>
</div>
